basePath: /api/v1
definitions:
  dto.AddMemberRequest:
    properties:
      expiredAt:
        description: optional
        example: "2026-12-31T23:59:59Z"
        type: string
      status:
        description: optional, default active
        enum:
        - active
        - expired
        - block
        example: active
        type: string
      userId:
        description: required
        example: 6f8d3c2a-1b4e-4f9a-9c2d-0a1b2c3d4e5f
        type: string
    required:
    - userId
    type: object
  dto.AssignTaskRequest:
    properties:
      assignedTo:
        type: string
    required:
    - assignedTo
    type: object
  dto.AuthResponse:
    properties:
      expiresAt:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.CommentResponse:
    properties:
      comment:
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      id:
        type: string
      idTask:
        type: string
      updatedAt:
        type: string
    type: object
  dto.CreateCommentRequest:
    properties:
      comment:
        description: required
        example: Looks good, merging.
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - comment
    type: object
  dto.CreateTaskRequest:
    properties:
      assignedTo:
        description: optional, defaults to creator; if set with idTeam must be an
          active member
        example: 6f8d3c2a-1b4e-4f9a-9c2d-0a1b2c3d4e5f
        type: string
      description:
        description: optional
        example: Cut v1.0 and tag it
        maxLength: 5000
        type: string
      dueDate:
        description: optional
        example: "2026-06-20T17:00:00Z"
        type: string
      idTeam:
        description: optional; you must belong to this team
        example: 2a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        type: string
      priority:
        description: optional, default MEDIUM
        enum:
        - LOW
        - MEDIUM
        - HIGH
        - URGENT
        example: HIGH
        type: string
      startDate:
        description: optional
        example: "2026-06-13T09:00:00Z"
        type: string
      status:
        description: optional, default TODO
        enum:
        - TODO
        - IN_PROGRESS
        - DONE
        - CANCELED
        - IN_REVIEW
        example: TODO
        type: string
      title:
        description: required
        example: Ship the release
        maxLength: 255
        minLength: 1
        type: string
    required:
    - title
    type: object
  dto.CreateTeamRequest:
    properties:
      name:
        description: required
        example: Platform Team
        maxLength: 150
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.LoginRequest:
    properties:
      login:
        description: username or email
        example: nowaf
        type: string
      password:
        example: secret123
        type: string
    required:
    - login
    - password
    type: object
  dto.MemberResponse:
    properties:
      createdAt:
        type: string
      expiredAt:
        type: string
      id:
        type: string
      idUser:
        type: string
      status:
        type: string
      user:
        $ref: '#/definitions/dto.UserBrief'
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: nowaf@example.com
        type: string
      name:
        example: Nowaf Dev
        maxLength: 150
        minLength: 2
        type: string
      password:
        description: bcrypt input is capped at 72 bytes
        example: secret123
        maxLength: 72
        minLength: 6
        type: string
      username:
        example: nowaf
        maxLength: 100
        minLength: 3
        type: string
    required:
    - email
    - name
    - password
    - username
    type: object
  dto.TaskLogResponse:
    properties:
      actionType:
        type: string
      activity:
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      id:
        type: string
    type: object
  dto.TaskResponse:
    properties:
      assignedTo:
        type: string
      assignee:
        $ref: '#/definitions/dto.UserBrief'
      createdAt:
        type: string
      createdBy:
        type: string
      description:
        type: string
      dueDate:
        type: string
      id:
        type: string
      idTeam:
        type: string
      priority:
        type: string
      startDate:
        type: string
      status:
        type: string
      title:
        type: string
      updatedAt:
        type: string
    type: object
  dto.TeamResponse:
    properties:
      createdAt:
        type: string
      createdBy:
        type: string
      id:
        type: string
      members:
        items:
          $ref: '#/definitions/dto.MemberResponse'
        type: array
      name:
        type: string
    type: object
  dto.UpdateCommentRequest:
    properties:
      comment:
        description: optional
        example: 'Edited: merged and deployed.'
        maxLength: 2000
        minLength: 1
        type: string
    type: object
  dto.UpdateMemberRequest:
    properties:
      expiredAt:
        description: optional
        example: "2026-12-31T23:59:59Z"
        type: string
      status:
        description: required
        enum:
        - active
        - expired
        - block
        example: block
        type: string
    required:
    - status
    type: object
  dto.UpdateTaskRequest:
    properties:
      description:
        description: optional
        example: Patch release
        maxLength: 5000
        type: string
      dueDate:
        description: optional
        example: "2026-06-25T17:00:00Z"
        type: string
      idTeam:
        description: optional; move the task into a team you belong to
        example: 2a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        type: string
      priority:
        description: optional
        enum:
        - LOW
        - MEDIUM
        - HIGH
        - URGENT
        example: URGENT
        type: string
      startDate:
        description: optional
        example: "2026-06-13T09:00:00Z"
        type: string
      status:
        description: optional
        enum:
        - TODO
        - IN_PROGRESS
        - DONE
        - CANCELED
        - IN_REVIEW
        example: IN_PROGRESS
        type: string
      title:
        description: optional
        example: Ship the release (v1.0.1)
        maxLength: 255
        minLength: 1
        type: string
    type: object
  dto.UserBrief:
    properties:
      id:
        type: string
      name:
        type: string
      username:
        type: string
    type: object
  dto.UserResponse:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      username:
        type: string
    type: object
  response.ErrorBody:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  response.Success:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/response.Meta'
      status:
        type: string
    type: object
info:
  contact: {}
  description: 'Multi-user task management API: JWT auth, idempotent task creation,
    transactional assignment, and structured logging.'
  title: GDCPAY Task Management API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: Log in and obtain an access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: Register a new user
      tags:
      - auth
  /comments/{id}:
    delete:
      parameters:
      - description: Comment id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Success'
      security:
      - BearerAuth: []
      summary: Delete a comment (author or task owner)
      tags:
      - comments
    put:
      consumes:
      - application/json
      parameters:
      - description: Comment id
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.CommentResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Edit a comment (author only)
      tags:
      - comments
  /tasks:
    get:
      parameters:
      - description: Filter by status (TODO, IN_PROGRESS, DONE, CANCELED, IN_REVIEW)
        in: query
        name: status
        type: string
      - description: Filter by priority (LOW, MEDIUM, HIGH, URGENT)
        in: query
        name: priority
        type: string
      - description: Search in title
        in: query
        name: q
        type: string
      - description: Filter by assignee user id
        in: query
        name: assignedTo
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Sort, e.g. created_at desc
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.TaskResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.Meta'
              type: object
      security:
      - BearerAuth: []
      summary: List tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      parameters:
      - description: Idempotency key (UUID)
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: Task payload (only title required)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Create a task (idempotent)
      tags:
      - tasks
  /tasks/{id}:
    delete:
      parameters:
      - description: Task id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Success'
      security:
      - BearerAuth: []
      summary: Delete a task (soft delete + cascade comments)
      tags:
      - tasks
    get:
      parameters:
      - description: Task id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Get a task by id
      tags:
      - tasks
    put:
      consumes:
      - application/json
      parameters:
      - description: Task id
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (all optional)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskResponse'
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Update a task
      tags:
      - tasks
  /tasks/{id}/assign:
    post:
      consumes:
      - application/json
      parameters:
      - description: Task id
        in: path
        name: id
        required: true
        type: string
      - description: Target user
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AssignTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.TaskResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Assign a task to a team member
      tags:
      - tasks
  /tasks/{id}/comments:
    get:
      parameters:
      - description: Task id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.CommentResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List comments on a task
      tags:
      - comments
    post:
      consumes:
      - application/json
      parameters:
      - description: Task id
        in: path
        name: id
        required: true
        type: string
      - description: Comment payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.CommentResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Add a comment to a task
      tags:
      - comments
  /tasks/{id}/logs:
    get:
      parameters:
      - description: Task id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.TaskLogResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Get the audit log of a task
      tags:
      - tasks
  /teams:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.TeamResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List teams the current user owns or belongs to
      tags:
      - teams
    post:
      consumes:
      - application/json
      parameters:
      - description: Team payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTeamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.TeamResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Create a team (creator becomes owner & first member)
      tags:
      - teams
  /teams/{id}:
    get:
      parameters:
      - description: Team id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.TeamResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Get a team by id
      tags:
      - teams
  /teams/{id}/members:
    get:
      parameters:
      - description: Team id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.MemberResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List members of a team
      tags:
      - teams
    post:
      consumes:
      - application/json
      parameters:
      - description: Team id
        in: path
        name: id
        required: true
        type: string
      - description: Member payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.MemberResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Add a member to a team (owner only)
      tags:
      - teams
  /teams/{id}/members/{userId}:
    delete:
      parameters:
      - description: Team id
        in: path
        name: id
        required: true
        type: string
      - description: User id
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Success'
      security:
      - BearerAuth: []
      summary: Remove a member from a team
      tags:
      - teams
    put:
      consumes:
      - application/json
      parameters:
      - description: Team id
        in: path
        name: id
        required: true
        type: string
      - description: User id
        in: path
        name: userId
        required: true
        type: string
      - description: Status payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Success'
            - properties:
                data:
                  $ref: '#/definitions/dto.MemberResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Update a team member's status
      tags:
      - teams
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
